    <style>

        }

        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;

            color: #333;

            color: #4A90E2;
        }

            background-color: #4A90E2;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;

            border-radius: 6px;

            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .btn-redirect:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        .btn-redirect:active {
